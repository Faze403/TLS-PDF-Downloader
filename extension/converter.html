<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TLS PDF Downloader</title>
    <link rel="stylesheet" href="converter.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>TLS PDF Downloader</h1>
        <p id="summary">문서 정보를 준비하고 있습니다.</p>
      </header>

      <section class="progress-area" aria-live="polite">
        <div class="progress-label">
          <span id="status">대기 중</span>
          <span id="count">0 / 0</span>
        </div>
        <progress id="progress" value="0" max="1"></progress>
      </section>

      <pre id="log" aria-label="변환 로그"></pre>

      <div class="actions">
        <button id="closeButton" type="button" hidden>닫기</button>
      </div>
    </main>

    <script src="vendor/pdf-lib.min.js"></script>
    <script src="converter.js"></script>
  </body>
</html>
